services:
  sirom-api:
    build: .
    image: sirom-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Shared, durable job state in Redis -> safe to run multiple workers.
      SIROM_JOB_STORE: redis
      SIROM_REDIS_URL: redis://redis:6379/0
      # SIROM_EXECUTOR: process
      # SIROM_WORKERS: "4"
      # SIROM_JOB_TTL: "86400"
    # With Redis-backed state you can scale out uvicorn workers:
    command: ["uvicorn", "sirom.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
