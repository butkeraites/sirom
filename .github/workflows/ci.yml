name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (pinned algorithm + API deps, then the package and test tools)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install --no-deps -e .
          pip install pytest httpx fakeredis
      - name: Run tests
        run: pytest -q

  changelog-guard:
    # Un-bypassable backstop for the release convention: a PR that bumps
    # pyproject.toml's version must also touch CHANGELOG.md. Complements the
    # local git pre-commit hook (.githooks/) and the Claude Code hook, which
    # are opt-in / --no-verify-bypassable.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require a CHANGELOG.md entry for version bumps
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null \
            || git fetch --no-tags --depth=1 origin "$BASE_SHA" 2>/dev/null || true
          if git diff "$BASE_SHA"...HEAD -- pyproject.toml | grep -qE '^\+version = ' \
             && ! git diff --name-only "$BASE_SHA"...HEAD | grep -qE '(^|/)CHANGELOG\.md$'; then
            echo "::error file=pyproject.toml::pyproject.toml version changed without a CHANGELOG.md entry in this PR. Add the [X.Y.Z] section to CHANGELOG.md (see CONTRIBUTING.md)."
            exit 1
          fi
          echo "changelog guard: OK"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t sirom-api .
      - name: Smoke-test the container
        run: |
          docker run -d --name sirom -p 8000:8000 sirom-api
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "container did not become healthy"; docker logs sirom; exit 1
