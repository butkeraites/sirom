name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (algorithm + API + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev]"
      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t sirom-api .
      - name: Smoke-test the container
        run: |
          docker run -d --name sirom -p 8000:8000 sirom-api
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "container did not become healthy"; docker logs sirom; exit 1
